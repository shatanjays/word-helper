<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#13243d"/>
    </linearGradient>
  </defs>
  <!-- full square background (only the centre 630 band is exported) -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <!-- OG design lives in the centred band y=285..915 -->
  <g transform="translate(0,285)">
    <rect x="48" y="36" width="1104" height="558" rx="28" fill="#faf9f7"/>
    <!-- brand mark -->
    <g transform="translate(96,84)">
      <rect x="0" y="0" width="76" height="76" rx="18" fill="#1e3a5f"/>
      <path d="M20 22h9l9 32 9-32h9" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 60h40" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round"/>
    </g>
    <text x="190" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#1e3a5f">Word Helper</text>
    <!-- headline -->
    <text x="96" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" fill="#111827">Define. Explore.</text>
    <text x="96" y="356" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" fill="#111827">Play with words.</text>
    <!-- tagline -->
    <text x="100" y="430" font-family="Arial, sans-serif" font-size="27" fill="#374151">Free word tools, dictionary, rhymes, syllables &amp; vocabulary</text>
    <!-- footer url -->
    <text x="100" y="492" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a5f">wordhelper.online</text>
  </g>
</svg>
